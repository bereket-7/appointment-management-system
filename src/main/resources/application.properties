spring.application.name=appointment
# Server Configuration
server.port=7070

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/appointment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:8915code}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Redis Configuration
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=2000ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=1800000 # 30 minutes
spring.cache.redis.cache-null-values=false

# Rate Limiting Configuration
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:60}
app.rate-limit.requests-per-hour=${RATE_LIMIT_RPH:1000}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySecretKey}
app.jwt.expiration-in-ms=${JWT_EXPIRATION:86400000}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:myRefreshSecretKey}
app.jwt.refresh-expiration-in-days=${JWT_REFRESH_EXPIRATION:7}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML5
spring.thymeleaf.cache=false

# Database Configuration
app.database.username=${DB_USERNAME:root}
app.database.password=${DB_PASSWORD:8915code}

# Mail Configuration
app.mail.host=${MAIL_HOST:smtp.gmail.com}
app.mail.port=${MAIL_PORT:587}
app.mail.username=${MAIL_USERNAME:app-email}
app.mail.password=${MAIL_PASSWORD:app-email-password}

# Logging Configuration
#logging.level.org.springframework=INFO
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.mail.host=${app.mail.host}
spring.mail.port=${app.mail.port}
spring.mail.username=${app.mail.username}
spring.mail.password=${app.mail.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
