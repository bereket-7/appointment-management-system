spring.application.name=appointment
# Server Configuration
server.port=7070

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/appointment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:8915code}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML5
spring.thymeleaf.cache=false


# JWT Configuration
app.jwt-secret=${JWT_SECRET:yourSecretKey}
app.jwt-expiration=${JWT_EXPIRATION:86400000}  # 1 day in milliseconds

# Database Configuration
app.database.username=${DB_USERNAME:root}
app.database.password=${DB_PASSWORD:8915code}

# Mail Configuration
app.mail.host=${MAIL_HOST:smtp.gmail.com}
app.mail.port=${MAIL_PORT:587}
app.mail.username=${MAIL_USERNAME:app-email}
app.mail.password=${MAIL_PASSWORD:app-email-password}

# Logging Configuration
#logging.level.org.springframework=INFO
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.mail.host=${app.mail.host}
spring.mail.port=${app.mail.port}
spring.mail.username=${app.mail.username}
spring.mail.password=${app.mail.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
