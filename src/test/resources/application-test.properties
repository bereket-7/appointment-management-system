# Test Configuration
spring.application.name=appointment-test

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Redis Configuration for Testing (use embedded or disable)
spring.redis.host=localhost
spring.redis.port=6370
spring.redis.timeout=1000ms

# Cache Configuration for Testing
spring.cache.type=simple
spring.cache.cache-null-values=false

# Rate Limiting Configuration for Testing
app.rate-limit.enabled=false

# JWT Configuration for Testing
app.jwt.secret=testSecretKey123456789012345678901234567890
app.jwt.expiration-in-ms=3600000 # 1 hour
app.jwt.refresh-secret=testRefreshSecretKey123456789012345678901234567890
app.jwt.refresh-expiration-in-days=1

# Logging Configuration for Testing
logging.level.com.beki.appointment=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Test Data Configuration
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:test-data.sql
